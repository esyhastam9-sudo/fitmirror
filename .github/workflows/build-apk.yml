name: Build APK

# Runs automatically whenever you push code, and lets you trigger it
# manually from the GitHub mobile app (Actions tab → Run workflow).
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Unzip project if uploaded as a zip
        run: |
          ZIP_FILE=$(find . -maxdepth 1 -iname "*.zip" | head -n 1)
          if [ -n "$ZIP_FILE" ]; then
            echo "Found $ZIP_FILE — extracting to repo root..."
            unzip -o "$ZIP_FILE" -d .
            rm -f "$ZIP_FILE"

            if [ ! -f build.gradle ]; then
              CANDIDATE=$(find . -maxdepth 2 -name "build.gradle" -not -path "./app/*" | head -n 1)
              if [ -n "$CANDIDATE" ]; then
                INNER_DIR=$(dirname "$CANDIDATE")
                echo "build.gradle found inside $INNER_DIR — flattening..."
                shopt -s dotglob
                cp -rT "$INNER_DIR" .
                shopt -u dotglob
              fi
            fi
          else
            echo "No zip found, assuming files were uploaded unzipped."
          fi

      - name: Debug - show repo contents
        run: |
          echo "── Top level ──"
          ls -la
          echo "── Recursive (depth 3, excluding .git) ──"
          find . -maxdepth 3 -not -path "./.git*"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Create wrapper files
        run: gradle wrapper --gradle-version 8.7

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: FitMirror-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
