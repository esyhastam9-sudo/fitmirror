name: Build APK

# Runs automatically whenever you push code, and lets you trigger it
# manually from the GitHub mobile app (Actions tab → Run workflow).
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Unzip project if uploaded as a zip
        # If you uploaded FitMirror-android.zip directly to the repo root,
        # this unpacks its contents into the repo root so the rest of the
        # workflow finds build.gradle etc. in the expected place. Safe
        # no-op if files were already uploaded unzipped.
        run: |
          ZIP_FILE=$(find . -maxdepth 1 -iname "*.zip" | head -n 1)
          if [ -n "$ZIP_FILE" ]; then
            echo "Found $ZIP_FILE — extracting to repo root..."
            unzip -o "$ZIP_FILE" -d .
            rm -f "$ZIP_FILE"
          else
            echo "No zip found, assuming files were uploaded unzipped."
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Generate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v3

      - name: Install Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Create wrapper files
        run: gradle wrapper --gradle-version 8.7

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: FitMirror-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
